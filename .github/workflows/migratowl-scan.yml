# Migratowl scans all outdated dependencies in this Node.js repo.
#
# Triggers:
#   - workflow_dispatch: full scan (no dep filter) — use for routine sweeps
#   - pull_request: full scan on every PR; targeted scan on Dependabot PRs
#     (single bumped dep extracted from branch name; grouped PRs fall back
#     to full scan automatically)
#
# Requirements:
#   - ANTHROPIC_API_KEY set as a repository secret
#   - The built-in GITHUB_TOKEN is used for PR comments (pull-requests: write)
#
# Sandbox: kind cluster (raw mode, no CRDs). kindnet does not enforce
# NetworkPolicy, so egress from the sandbox Pod is unrestricted — the sandbox
# only clones a public repo and runs npm test, so this is acceptable here.

name: Migratowl Dependency Scan

on:
  workflow_dispatch: {}
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  migratowl-scan:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write

    steps:
      - name: Checkout Migratowl
        uses: actions/checkout@v4
        with:
          repository: bitkaio/migratowl
          ref: v0.4.0
          path: .migratowl
          persist-credentials: false

      - name: Set up kind cluster
        uses: helm/kind-action@v1

      - name: Apply raw-mode RBAC
        run: |
          kubectl apply -f - <<'RBAC'
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: migratowl
            namespace: default
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: migratowl-sandbox-role
            namespace: default
          rules:
            - apiGroups: [""]
              resources: ["pods"]
              verbs: ["create", "get", "list", "watch", "delete"]
            - apiGroups: [""]
              resources: ["pods/exec"]
              verbs: ["create"]
            - apiGroups: [""]
              resources: ["pods/log"]
              verbs: ["get"]
            - apiGroups: ["networking.k8s.io"]
              resources: ["networkpolicies"]
              verbs: ["create", "delete"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: migratowl-sandbox-rolebinding
            namespace: default
          subjects:
            - kind: ServiceAccount
              name: migratowl
              namespace: default
          roleRef:
            kind: Role
            name: migratowl-sandbox-role
            apiGroup: rbac.authorization.k8s.io
          RBAC

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-caching: true
          cache-dependency-glob: ".migratowl/uv.lock"

      - name: Install Migratowl
        run: uv sync --frozen
        working-directory: .migratowl

      - name: Start Migratowl server
        env:
          MIGRATOWL_SANDBOX_MODE: raw
          MIGRATOWL_SANDBOX_IMAGE: node:22-bookworm
          MIGRATOWL_SANDBOX_BLOCK_NETWORK: "false"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run uvicorn migratowl.api.main:app \
            --host 127.0.0.1 --port 8000 \
            > /tmp/migratowl.log 2>&1 &
          echo $! > /tmp/migratowl.pid
        working-directory: .migratowl

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/healthz > /dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server did not start in time"
          cat /tmp/migratowl.log
          exit 1

      - name: Build payload and trigger scan
        id: trigger
        env:
          REPO_URL: ${{ github.event.repository.clone_url }}
          BASE_BRANCH: ${{ github.base_ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          HEAD_BRANCH: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            BRANCH="$DEFAULT_BRANCH"
          elif echo "$HEAD_BRANCH" | grep -q "^dependabot/"; then
            # Dependabot PR: scan base — dep is already bumped on the head branch,
            # so scanning head would show it as "already at latest" and skip it.
            BRANCH="$BASE_BRANCH"
          else
            # Regular PR: scan head — test the actual submitted code against
            # upgraded deps, not the base branch which may lack new test files.
            BRANCH="$HEAD_BRANCH"
          fi

          # Extract dep name from Dependabot branch: dependabot/<ecosystem>/<name>-<version>
          # Grouped PRs produce no match; check_deps stays [] → full scan
          DEP_NAME=$(echo "$HEAD_BRANCH" | sed -n 's|dependabot/[^/]*/\(.*\)-[0-9][0-9.]*$|\1|p')
          if [ -n "$DEP_NAME" ]; then
            CHECK_DEPS=$(jq -n --arg dep "$DEP_NAME" '[$dep]')
          else
            CHECK_DEPS='[]'
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            payload=$(jq -n \
              --arg  repo_url    "$REPO_URL" \
              --arg  branch_name "$BRANCH" \
              --argjson check_deps "$CHECK_DEPS" \
              '{repo_url: $repo_url, branch_name: $branch_name,
                git_provider: "github", check_deps: $check_deps}')
          else
            payload=$(jq -n \
              --arg     repo_url    "$REPO_URL" \
              --arg     branch_name "$BRANCH" \
              --argjson pr_number   "${PR_NUMBER:-null}" \
              --arg     commit_sha  "$COMMIT_SHA" \
              --argjson check_deps  "$CHECK_DEPS" \
              '{repo_url: $repo_url, branch_name: $branch_name,
                git_provider: "github", pr_number: $pr_number,
                commit_sha: $commit_sha, check_deps: $check_deps}')
          fi

          JOB_ID=$(curl --fail-with-body -sX POST http://127.0.0.1:8000/webhook \
            -H "Content-Type: application/json" \
            -d "$payload" | jq -r .job_id)

          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Scan triggered: job $JOB_ID"

      - name: Poll until scan completes
        id: result
        env:
          JOB_ID: ${{ steps.trigger.outputs.job_id }}
        run: |
          echo "Waiting 10 minutes before first poll..."
          sleep 600

          DEADLINE=$(($(date +%s) + 3600))
          while [ $(date +%s) -lt $DEADLINE ]; do
            RESPONSE=$(curl -sf "http://127.0.0.1:8000/jobs/$JOB_ID")
            STATE=$(echo "$RESPONSE" | jq -r .state)
            echo "[$(date -u +%H:%M:%S)] state: $STATE"
            if [ "$STATE" = "completed" ] || [ "$STATE" = "failed" ]; then
              echo "$RESPONSE" > /tmp/scan-result.json
              echo "final_state=$STATE" >> "$GITHUB_OUTPUT"
              break
            fi
            sleep 30
          done

          if [ "$STATE" != "completed" ] && [ "$STATE" != "failed" ]; then
            echo "Scan timed out after 1 hour"
            cat /tmp/migratowl.log
            exit 1
          fi

      - name: Print scan summary
        if: always()
        env:
          FINAL_STATE: ${{ steps.result.outputs.final_state }}
        run: |
          echo "=== Scan state: $FINAL_STATE ==="
          if [ -f /tmp/scan-result.json ]; then
            jq '{state, error,
                 outdated_count: (.result.scan_result.outdated // [] | length),
                 reports: [.result.reports // [] | .[] | {dependency_name, is_breaking, confidence}]}' \
              /tmp/scan-result.json
            if [ "$(jq -r .state /tmp/scan-result.json)" = "failed" ]; then
              echo "--- Migratowl server log ---"
              cat /tmp/migratowl.log
            fi
          fi

      - name: Upload full result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migratowl-scan-result
          path: /tmp/scan-result.json
          retention-days: 30

      - name: Fail if scan errored
        if: steps.result.outputs.final_state == 'failed'
        run: |
          echo "Migratowl scan job failed — check the artifact for details"
          exit 1
